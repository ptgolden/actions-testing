name: Ontology QC

on:
  workflow_call:
  workflow_dispatch:

jobs:
  ontology_qc:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run ontology QC checks
        env:
          DEFAULT_BRANCH: master
        run: |
          cd src/ontology
          make test
